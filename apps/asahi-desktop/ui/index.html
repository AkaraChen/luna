<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asahi</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f6f1;
        color: #282721;
      }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }
      body::before {
        content: "Starting Asahi...";
        font-size: 13px;
        font-weight: 500;
      }
      body[data-status="failed"]::before {
        content: "Asahi failed to start.";
        color: #9f2f24;
      }
    </style>
  </head>
  <body></body>
</html>
